[behave]
# Test discovery
paths = features

# Output format
stdout_capture = false
stderr_capture = false
log_capture    = false

# Console output
format   = pretty
colorama = true

# Logging
logging_level   = INFO
logging_format  = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli         = true

# Stop on first failure (comment out to run all)
# stop = true

# Tags to run (comment out to run all)
# tags = @positive

# Allure results directory (used with --format allure_behave.formatter:AllureFormatter)
# Run with:
# behave -f allure_behave.formatter:AllureFormatter -o reports/allure-results
